openapi: 3.1.0
info:
  title: WSO2 Identity Server Webhook Event Payloads
  version: 1.0.0
  description: |
    Contract for the webhook event payloads emitted by the WSO2 Identity Server.

    Each webhook event payload provides structured details compliant with the
    [Security Event Token (SET) specification (RFC 8417)](https://datatracker.ietf.org/doc/html/rfc8417) 
    containing issuer information, timestamp, unique identifiers, user and organization context, 
    and event-specific metadata.

# OpenAPI 3.1 `webhooks`: the Identity Server is the sender; the consumer implements
# this endpoint. A single payload shape carries every event type.
webhooks:
  identityEvent:
    post:
      summary: An identity event delivered to the subscribed webhook endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookEvent'
