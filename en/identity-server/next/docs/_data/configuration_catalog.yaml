  # ─────────────────────────── MONITORING / LOGGING ───────────────────────────

  - id: carbon_health_check
    hyperlink: carbon-health-check
    title: Carbon health check
    tasks: [configure-monitoring]
    description: >
      Enables the built-in health check endpoint (/api/health-check/v1.0/health) to monitor server and data source health.

    configs:
      - key: enable
        type: boolean
        required: false
        default: true
        possible_values: [true, false]
        description: >
          Set to true to enable the health check API.

  - id: carbon_health_check.health_checker.data_source_health_checker
    hyperlink: carbon-health-check-data-source-checker
    title: Data source health checker
    tasks: [configure-monitoring]
    description: >
      Checks whether configured data sources are reachable and functional.

    configs:
      - key: enable
        type: boolean
        required: false
        default: false
        possible_values: [true, false]
        description: >
          Set to true to enable the data source health checker.
      - key: order
        type: string
        required: false
        default: "97"
        description: >
          The execution order of this checker relative to others. Lower values run first.
      - key: pool_usage_limit_percentage
        type: string
        required: false
        default: "20"
        description: >
          The maximum percentage of the connection pool that can be in use before this checker reports an unhealthy status.

  - id: carbon_health_check.health_checker.super_tenant_health_checker
    hyperlink: carbon-health-check-super-tenant-checker
    title: Super tenant health checker
    tasks: [configure-monitoring]
    description: >
      Checks the health of the super tenant's user store connection.

    configs:
      - key: enable
        type: boolean
        required: false
        default: false
        possible_values: [true, false]
        description: >
          Set to true to enable the super tenant health checker.
      - key: order
        type: string
        required: false
        default: "98"
        description: >
          The execution order of this checker relative to others.

  - id: monitoring.jmx
    hyperlink: monitoring-jmx
    title: JMX monitoring
    tasks: [configure-monitoring]
    description: >
      Enables JMX (Java Management Extensions) for runtime monitoring and management of server components.

    configs:
      - key: rmi_server_start
        type: boolean
        required: false
        default: false
        possible_values: [true, false]
        description: >
          Set to true to start the JMX RMI server, allowing external JMX clients to connect and monitor the server.

  - id: tracing.opentelemetry
    hyperlink: tracing-opentelemetry
    title: OpenTelemetry tracing
    tasks: [configure-monitoring]
    description: >
      Configures OpenTelemetry distributed tracing for monitoring request flows across services.

    configs:
      - key: ldap.enabled
        type: boolean
        required: false
        default: false
        possible_values: [true, false]
        description: >
          Set to true to enable tracing of LDAP operations.
      - key: ldap.scope_name
        type: string
        required: false
        default: wso2isldap
        description: >
          The tracing scope name used for LDAP spans.

  - id: log_mgt
    hyperlink: log-mgt
    title: Log management
    tasks: [configure-monitoring]
    description: >
      Controls log file behavior and formatting for the Identity Server.

    configs:
      - key: audit_log.truncate_to_microseconds
        type: boolean
        required: false
        default: false
        possible_values: [true, false]
        description: >
          Set to true to truncate audit log timestamps to microsecond precision.

  - id: masking_logs
    hyperlink: masking-logs
    title: Log masking
    tasks: [configure-monitoring]
    description: >
      Enables masking of sensitive data (such as passwords and tokens) in log output.

    configs:
      - key: enabled
        type: boolean
        required: false
        default: false
        possible_values: [true, false]
        description: >
          Set to true to enable log masking. Define the patterns to mask under [masking_pattern.properties].

  - id: catalina.valves.valve.properties
    hyperlink: catalina-valves-valve-properties
    title: HTTP access log valve
    tasks: [configure-monitoring]
    description: >
      Configures the Tomcat extended access log valve for logging HTTP requests.

    configs:
      - key: className
        type: string
        required: true
        default: org.apache.catalina.valves.ExtendedAccessLogValve
        description: >
          The fully-qualified class name of the Tomcat access log valve.
      - key: directory
        type: string
        required: false
        default: "${carbon.home}/repository/logs"
        description: >
          The directory where access log files are written.
      - key: prefix
        type: string
        required: false
        default: localhost_access_log.
        description: >
          The filename prefix for access log files.
      - key: suffix
        type: string
        required: false
        default: .log
        description: >
          The filename suffix for access log files.
      - key: pattern
        type: string
        required: false
        default: "%h %l %u %t \"%r\" %s %b"
        description: >
          The log pattern defining which HTTP request attributes to record.

  - id: audit.log.loggable_user_claim
    hyperlink: audit-log-loggable-user-claim
    title: Audit log user claims
    tasks: [configure-monitoring]
    description: >
      Specifies user attribute claims to include in audit log entries for each operation.

    configs:
      - key: claim1
        type: string
        required: false
        default: "http://wso2.org/claims/identity/accountLocked"
        description: >
          The URI of a claim to include in audit log entries. Replace with any valid WSO2 claim URI.
      - key: claim2
        type: string
        required: false
        default: "http://wso2.org/claims/role"
        description: >
          The URI of a second claim to include in audit log entries.

  # ─────────────────────────── EMAIL ───────────────────────────

  - id: output_adapter.email
    hyperlink: output-adapter-email
    title: Email sending module
    tasks: [configure-email]
    description: >
      Configures the SMTP settings for outbound email notifications such as account verification and password reset emails.

    configs:
      - key: hostname
        type: string
        required: true
        default: smtp.gmail.com
        description: >
          The hostname of the SMTP server.
      - key: port
        type: integer
        required: true
        default: "587"
        description: >
          The port of the SMTP server. Common values are 25, 465 (SMTPS), and 587 (STARTTLS).
      - key: from_address
        type: string
        required: true
        default: ""
        description: >
          The email address that appears in the From field of outgoing messages.
      - key: username
        type: string
        required: false
        default: ""
        description: >
          The username used to authenticate with the SMTP server.
      - key: password
        type: string
        required: false
        default: ""
        description: >
          The password used to authenticate with the SMTP server.
      - key: auth_type
        type: string
        required: false
        default: BASIC
        possible_values: [BASIC, NTLM]
        description: >
          The authentication method for the SMTP connection.
      - key: enable_authentication
        type: boolean
        required: false
        default: true
        possible_values: [true, false]
        description: >
          Set to true to require SMTP authentication.
      - key: enable_start_tls
        type: boolean
        required: false
        default: true
        possible_values: [true, false]
        description: >
          Set to true to upgrade the SMTP connection to TLS using the STARTTLS command.
      - key: signature
        type: string
        required: false
        default: ""
        description: >
          A signature line appended at the bottom of outgoing email messages.

  # ─────────────────────────── FIDO / PASSKEYS ───────────────────────────

  - id: fido
    hyperlink: fido
    title: FIDO
    tasks: [configure-fido]
    description: >
      Configures general FIDO/WebAuthn settings such as the user response timeout for FIDO2 device registration.

    configs:
      - key: user_response_timeout
        type: string
        required: false
        default: "300000"
        description: >
          The time in milliseconds sent as a hint to the browser for how long to wait for the user to interact with their FIDO2 authenticator during device registration. This timeout is enforced by the browser, not the server, and applies only to FIDO2 device registration (not authentication).

  - id: fido.metadata_service
    hyperlink: fido-metadata-service
    title: FIDO metadata service
    tasks: [configure-fido]
    description: >
      Enables FIDO2 attestation verification using the FIDO Metadata Service (MDS). Required for enforcing strong authenticator policies.

    configs:
      - key: enable
        type: boolean
        required: false
        default: false
        possible_values: [true, false]
        description: >
          Set to true to fetch and use the FIDO Alliance Metadata Service for attestation validation.
      - key: mds_endpoints
        type: array
        required: false
        default: "[]"
        description: >
          A list of URLs from which the server downloads FIDO MDS metadata blobs.

  # ─────────────────────────── AI SERVICES ───────────────────────────

  - id: ai_services
    hyperlink: ai-services
    title: AI services
    tasks: [configure-ai]
    description: >
      Configures the API key for WSO2 AI-powered features such as AI-assisted login flow design.

    configs:
      - key: key
        type: string
        required: true
        default: ""
        description: >
          The subscription key that authenticates requests to the WSO2 AI services API.

  # ─────────────────────────── ACTIONS ───────────────────────────

  - id: actions
    hyperlink: actions
    title: Actions
    tasks: [configure-actions]
    description: >
      HTTP connection pool settings for external action endpoints invoked during authentication and provisioning flows.

    configs:
      - key: http_client.connection_pool_size
        type: integer
        required: false
        default: "10"
        description: >
          The maximum number of connections the HTTP client maintains across all external action endpoints.
      - key: http_client.connection_timeout
        type: integer
        required: false
        default: "3000"
        description: >
          The timeout (in milliseconds) for establishing a connection to an action endpoint.
      - key: http_client.read_timeout
        type: integer
        required: false
        default: "6000"
        description: >
          The timeout (in milliseconds) for reading a response from an action endpoint.
      - key: http_client.request_timeout
        type: integer
        required: false
        default: "3000"
        description: >
          The maximum time (in milliseconds) allowed for a complete HTTP request to an action endpoint.
      - key: http_client.retry_count
        type: integer
        required: false
        default: "1"
        description: >
          The number of times the HTTP client retries a failed request to an action endpoint.

  # ─────────────────────────── IDENTITY MANAGEMENT ───────────────────────────

  - id: identity_mgt.user_self_registration
    hyperlink: identity-mgt-user-self-registration
    title: User self-registration
    tasks: [configure-identity]
    description: >
      Controls behavior of the user self-registration flow for preferred channel verification.

    configs:
      - key: enable_account_lock_for_verified_preferred_channel
        type: boolean
        required: false
        default: false
        possible_values: [true, false]
        description: >
          Set to false to skip account locking when a user self-registers with a verified preferred communication channel.

  # ─────────────────────────── API SECURITY ───────────────────────────

  - id: resource.access_control
    hyperlink: resource-access-control
    title: Resource access control
    tasks: [configure-security]
    description: >
      Configures access control rules for specific API endpoints, such as requiring authentication or specific scopes.

    configs:
      - key: context
        type: string
        required: true
        default: "/api/identity/*"
        description: >
          The URL context pattern this access control rule applies to.
      - key: secured
        type: boolean
        required: false
        default: true
        possible_values: [true, false]
        description: >
          Set to true to require authentication for requests matching the context.
      - key: http_method
        type: string
        required: false
        default: all
        description: >
          The HTTP method this rule applies to. Use all to match any method.
      - key: permissions
        type: array
        required: false
        default: "[]"
        description: >
          A list of permission strings a caller must have to access this resource.
      - key: scope
        type: array
        required: false
        default: "[]"
        description: >
          A list of OAuth scopes required to access this resource.
      - key: allowed_auth_handlers
        type: array
        required: false
        default: "[]"
        description: >
          A list of authentication handler names permitted to authenticate requests to this resource.

  # ─────────────────────────── STS (WS-FEDERATION) ───────────────────────────

  - id: sts
    hyperlink: sts
    title: Security token service (STS)
    tasks: [configure-sts]
    description: >
      Configures the WS-Federation Security Token Service (STS), which issues SAML tokens for WS-Federation web applications.

    configs:
      - key: signature_algorithm
        type: string
        required: false
        default: "http://www.w3.org/2001/04/xmldsig-more#rsa-sha256"
        description: >
          The XML signature algorithm used to sign issued SAML tokens.
      - key: digest_algorithm
        type: string
        required: false
        default: "http://www.w3.org/2001/04/xmlenc#sha256"
        description: >
          The digest algorithm used when signing SAML tokens.

  # ─────────────────────────── CORS ───────────────────────────

  - id: cors
    hyperlink: cors
    title: CORS
    tasks: [configure-security]
    description: >
      Configures Cross-Origin Resource Sharing (CORS) for the Identity Server APIs.
      CORS allows browsers to make requests to Identity Server APIs from different origins.

    configs:
      - key: allow_generic_http_requests
        type: boolean
        required: false
        default: true
        possible_values: [true, false]
        description: >
          Set to true to allow ordinary HTTP requests without CORS headers to pass through.
      - key: allow_any_origin
        type: boolean
        required: false
        default: false
        possible_values: [true, false]
        description: >
          Set to true to allow requests from any origin. Not recommended for production environments.
      - key: allowed_origins
        type: array
        required: false
        default: "[]"
        description: >
          A list of origins permitted to make cross-origin requests. For example, https://app.example.com.
          Only used when allow_any_origin is false.
      - key: allow_subdomains
        type: boolean
        required: false
        default: false
        possible_values: [true, false]
        description: >
          Set to true to allow requests from subdomains of the entries in allowed_origins.
      - key: supported_methods
        type: array
        required: false
        default: "[GET, POST, PUT, PATCH, DELETE, HEAD, OPTIONS]"
        description: >
          The HTTP methods permitted in cross-origin requests.
      - key: support_any_header
        type: boolean
        required: false
        default: true
        possible_values: [true, false]
        description: >
          Set to true to allow any HTTP request header in cross-origin requests.
      - key: supported_headers
        type: array
        required: false
        default: "[]"
        description: >
          A list of HTTP request headers allowed in cross-origin requests.
          Only used when support_any_header is false.
      - key: exposed_headers
        type: array
        required: false
        default: "[]"
        description: >
          A list of HTTP response headers that browsers are allowed to access.
      - key: supports_credentials
        type: boolean
        required: false
        default: true
        possible_values: [true, false]
        description: >
          Set to true to allow cross-origin requests to include credentials such as cookies
          and authorization headers.
      - key: max_age
        type: integer
        required: false
        default: "-1"
        description: >
          The duration (in seconds) browsers may cache the preflight response.
          Set to -1 to disable preflight caching.

  # ─────────────────────────── SAML ───────────────────────────

  - id: saml
    hyperlink: saml
    title: SAML 2.0 configuration
    tasks: [configure-saml]
    description: >
      General SAML 2.0 settings for the Identity Server acting as a SAML identity provider.

    configs:
      - key: signing_alg
        type: string
        required: false
        default: "http://www.w3.org/2001/04/xmldsig-more#rsa-sha256"
        description: >
          The XML signature algorithm used to sign SAML assertions and responses.
      - key: digest_alg
        type: string
        required: false
        default: "http://www.w3.org/2001/04/xmlenc#sha256"
        description: >
          The digest algorithm used in SAML assertion signatures.
      - key: assertion_encryption_alg
        type: string
        required: false
        default: "http://www.w3.org/2001/04/xmlenc#aes256-cbc"
        description: >
          The symmetric encryption algorithm used to encrypt SAML assertions.
      - key: key_encryption_alg
        type: string
        required: false
        default: "http://www.w3.org/2001/04/xmlenc#rsa-oaep-mgf1p"
        description: >
          The algorithm used to encrypt the symmetric key during SAML assertion encryption.
      - key: response.validity
        type: string
        required: false
        default: "5m"
        description: >
          The validity period of a SAML response. Responses older than this period are rejected.
      - key: artifact.validity
        type: string
        required: false
        default: "4m"
        description: >
          The validity period of a SAML artifact used in the SAML artifact binding flow.
      - key: slo.retry_attempts
        type: integer
        required: false
        default: "5"
        description: >
          The number of retry attempts for back-channel SAML single logout (SLO) requests.
      - key: slo.retry_interval
        type: string
        required: false
        default: "1m"
        description: >
          The delay between SAML SLO retry attempts.
      - key: slo.host_name_verification
        type: boolean
        required: false
        default: true
        possible_values: [true, false]
        description: >
          Set to true to enforce hostname verification for back-channel SAML SLO requests.
      - key: enable_request_validity_period
        type: boolean
        required: false
        default: false
        possible_values: [true, false]
        description: >
          Set to true to enforce a validity window on incoming SAML authentication requests.
      - key: request_validity_period
        type: string
        required: false
        default: "5m"
        description: >
          The validity window for SAML authentication requests.
          Only evaluated when enable_request_validity_period is true.

  - id: saml.endpoints
    hyperlink: saml-endpoints
    title: SAML endpoints
    tasks: [configure-saml]
    description: >
      Custom URLs for SAML 2.0 endpoints. Override the defaults when the Identity Server is deployed
      behind a reverse proxy or when custom paths are required.

    configs:
      - key: idp_url
        type: string
        required: false
        default: "${server.base_path}/samlsso"
        description: >
          The SAML 2.0 SSO service URL. Applications send authentication requests to this URL.
      - key: artifact_resolution
        type: string
        required: false
        default: "${server.base_path}/samlartresolve"
        description: >
          The URL of the SAML 2.0 artifact resolution service.
      - key: logout
        type: string
        required: false
        default: "${server.base_path}/authenticationendpoint/samlsso_logout.do"
        description: >
          The URL of the SAML SLO logout page.

  - id: saml.metadata
    hyperlink: saml-metadata
    title: SAML metadata
    tasks: [configure-saml]
    description: >
      Configures the SAML IdP metadata document published by the Identity Server
      for service provider discovery and configuration.

    configs:
      - key: validity_period
        type: string
        required: false
        default: "1h"
        description: >
          The validity period of the published SAML metadata document.
      - key: enable_signing
        type: boolean
        required: false
        default: false
        possible_values: [true, false]
        description: >
          Set to true to sign the SAML metadata document using the primary keystore.
      - key: enable_authentication_requests_signing
        type: boolean
        required: false
        default: false
        possible_values: [true, false]
        description: >
          Set to true to include signing certificate information in the metadata for authentication requests.

  # ─────────────────────────── SCIM ───────────────────────────

  - id: scim2
    hyperlink: scim2
    title: SCIM 2.0
    tasks: [configure-scim]
    description: >
      Configures the behavior of the SCIM 2.0 provisioning endpoints for user and group management.

    configs:
      - key: enable_filtering_enhancements
        type: boolean
        required: false
        default: false
        possible_values: [true, false]
        description: >
          Set to true to enable enhanced filter query support for SCIM 2.0 user and group endpoints.
      - key: enable_group_based_user_filter_improvements
        type: boolean
        required: false
        default: true
        possible_values: [true, false]
        description: >
          Set to true to use optimized SQL queries when filtering users by group membership.
      - key: filter_users_and_groups_from_primary_domain
        type: boolean
        required: false
        default: false
        possible_values: [true, false]
        description: >
          Set to true to restrict user and group list operations to the PRIMARY user store domain.
      - key: mandate_domain_for_uesrnames_and_group_names_in_response
        type: boolean
        required: false
        default: false
        possible_values: [true, false]
        description: >
          Set to true to always prefix usernames and group names with the domain name in SCIM responses.
      - key: return_updated_group_in_group_patch_response
        type: boolean
        required: false
        default: true
        possible_values: [true, false]
        description: >
          Set to true to return the updated group representation in PATCH response payloads.
      - key: notify_userstore_status
        type: boolean
        required: false
        default: false
        possible_values: [true, false]
        description: >
          Set to true to include user store availability status in SCIM error responses.
      - key: consider_max_limit_for_total_results
        type: boolean
        required: false
        default: false
        possible_values: [true, false]
        description: >
          Set to true to use the server-wide maximum page size when calculating totalResults in list responses.
      - key: return_conflict_on_claim_uniqueness_violation
        type: boolean
        required: false
        default: true
        possible_values: [true, false]
        description: >
          Set to true to return a 409 Conflict error when a uniqueness constraint is violated on a SCIM attribute.
      - key: enable_spec_compliant_email_handling
        type: boolean
        required: false
        default: true
        possible_values: [true, false]
        description: >
          Set to true to handle email addresses in compliance with the SCIM 2.0 specification.

  # ─────────────────────────── IDENTITY MANAGEMENT (EXTENDED) ───────────────────────────

  - id: identity_mgt.recovery
    hyperlink: identity-mgt-recovery
    title: Account recovery
    tasks: [configure-identity]
    description: >
      Controls the self-service account recovery flow, including password and username recovery.

    configs:
      - key: notification.manage_internally
        type: boolean
        required: false
        default: true
        possible_values: [true, false]
        description: >
          Set to true to handle recovery email notifications using the server's internal email module.
      - key: enable_detailed_error_messages
        type: boolean
        required: false
        default: false
        possible_values: [true, false]
        description: >
          Set to true to return detailed error messages during recovery flows.
          Disable in production environments to prevent user enumeration.
      - key: hide_user_existence
        type: boolean
        required: false
        default: false
        possible_values: [true, false]
        description: >
          Set to true to return a generic response when a user account is not found during recovery,
          reducing user enumeration risk.
      - key: notify_user_existence
        type: boolean
        required: false
        default: false
        possible_values: [true, false]
        description: >
          Set to true to notify a user if their account does not exist when they attempt to initiate recovery.
      - key: callback_url
        type: string
        required: false
        default: "${carbon.protocol}://${carbon.host}:${carbon.management.port}/.*"
        description: >
          A regex pattern the recovery callback URL must match.
          Restricts where users can be redirected after completing the recovery flow.
      - key: enable_v1_api
        type: boolean
        required: false
        default: false
        possible_values: [true, false]
        description: >
          Set to true to enable the deprecated v1 account recovery API.

  - id: identity_mgt.user_onboarding
    hyperlink: identity-mgt-user-onboarding
    title: User onboarding
    tasks: [configure-identity]
    description: >
      Controls the admin-initiated user onboarding flow, including email verification
      and Ask Password flows.

    configs:
      - key: enable_email_verification
        type: boolean
        required: false
        default: false
        possible_values: [true, false]
        description: >
          Set to true to send a verification email when an admin creates a new user account.
      - key: ask_password_from_user
        type: boolean
        required: false
        default: true
        possible_values: [true, false]
        description: >
          Set to true to send an Ask Password email when an admin creates a user without specifying a password.
      - key: lock_on_creation
        type: boolean
        required: false
        default: true
        possible_values: [true, false]
        description: >
          Set to true to lock a newly created user account until the user completes the onboarding flow.
      - key: verification_email_validity
        type: string
        required: false
        default: "1d"
        description: >
          The validity period of the email verification link sent during onboarding.
      - key: notification.manage_internally
        type: boolean
        required: false
        default: true
        possible_values: [true, false]
        description: >
          Set to true to handle onboarding notifications through the server's internal email module.

  - id: identity_mgt.user_claim_update
    hyperlink: identity-mgt-user-claim-update
    title: User claim update verification
    tasks: [configure-identity]
    description: >
      Controls whether changes to user attributes such as email address and mobile number
      require verification before they take effect.

    configs:
      - key: email.enable_verification
        type: boolean
        required: false
        default: false
        possible_values: [true, false]
        description: >
          Set to true to require email address verification when a user changes their email.
      - key: email.verification_email_validity
        type: string
        required: false
        default: "1d"
        description: >
          The validity period of the verification link sent when an email address is updated.
      - key: email.enable_notify_existing_email
        type: boolean
        required: false
        default: false
        possible_values: [true, false]
        description: >
          Set to true to notify the previous email address when a user requests an email change.
      - key: mobile.enable_verification
        type: boolean
        required: false
        default: false
        possible_values: [true, false]
        description: >
          Set to true to require mobile number verification via OTP when a user changes their mobile number.
      - key: mobile.verification_sms_otp_validity
        type: integer
        required: false
        default: "5"
        description: >
          The validity period (in minutes) of the SMS OTP sent for mobile number verification.

  - id: identity_mgt.password_reset_email
    hyperlink: identity-mgt-password-reset-email
    title: Password reset by email
    tasks: [configure-identity]
    description: >
      Configures the email-based password reset flow for self-service account recovery.

    configs:
      - key: enable_password_reset_email
        type: boolean
        required: false
        default: false
        possible_values: [true, false]
        description: >
          Set to true to enable the email link-based password reset flow.
      - key: reset_mail_validity
        type: string
        required: false
        default: "1d"
        description: >
          The validity period of the password reset link sent by email.
      - key: enable_recaptcha
        type: boolean
        required: false
        default: false
        possible_values: [true, false]
        description: >
          Set to true to require reCAPTCHA verification before a password reset email is sent.
      - key: notify_on_reset
        type: boolean
        required: false
        default: false
        possible_values: [true, false]
        description: >
          Set to true to send a confirmation email to the user after a successful password reset.
      - key: otp.send_otp_in_email
        type: boolean
        required: false
        default: false
        possible_values: [true, false]
        description: >
          Set to true to send a one-time password (OTP) in the reset email instead of a clickable link.
      - key: otp.otp_length
        type: integer
        required: false
        default: "6"
        description: >
          The number of characters in the OTP sent for email-based password reset.

  - id: identity_mgt.notification
    hyperlink: identity-mgt-notification
    title: Notification channel
    tasks: [configure-identity]
    description: >
      Configures the default notification channel and channel resolution behavior for
      identity management notifications such as verification emails and SMS OTPs.

    configs:
      - key: default_notification_channel
        type: string
        required: false
        default: "EMAIL"
        possible_values: [EMAIL, SMS]
        description: >
          The default notification channel used when a preferred channel cannot be determined.
      - key: resolve_notification_channel
        type: boolean
        required: false
        default: false
        possible_values: [true, false]
        description: >
          Set to true to dynamically resolve the notification channel based on user profile attributes
          rather than always using the default channel.

  - id: identity_mgt.password_policy
    hyperlink: identity-mgt-password-policy
    title: Password policy
    tasks: [configure-identity]
    description: >
      Configures server-wide password policy constraints.

    configs:
      - key: max_password_allowed_length
        type: integer
        required: false
        default: "64"
        description: >
          The maximum number of characters allowed in a user password.

  - id: identity_mgt.login_identifiers
    hyperlink: identity-mgt-login-identifiers
    title: Login identifiers
    tasks: [configure-identity]
    description: >
      Configures alternative login identifiers that users can use instead of a username
      to authenticate. For example, email address or mobile number.

    configs:
      - key: enable
        type: boolean
        required: false
        default: false
        possible_values: [true, false]
        description: >
          Set to true to allow users to authenticate using alternative identifiers such as email address.
      - key: primary_claim
        type: string
        required: false
        default: "http://wso2.org/claims/username"
        description: >
          The claim URI used as the primary login identifier.

  # ─────────────────────────── OUTBOUND PROVISIONING ───────────────────────────

  - id: outbound_provisioning_management
    hyperlink: outbound-provisioning-management
    title: Outbound provisioning
    tasks: [configure-provisioning]
    description: >
      Configures the behavior of outbound provisioning, where user lifecycle events in the Identity Server
      are propagated to external systems such as SCIM-enabled directories or HR systems.

    configs:
      - key: reset_provisioning_entities_on_config_update
        type: boolean
        required: false
        default: true
        possible_values: [true, false]
        description: >
          Set to true to re-provision all entities when the outbound provisioning connector configuration changes.
      - key: enable_application_based_outbound_provisioning
        type: boolean
        required: false
        default: false
        possible_values: [true, false]
        description: >
          Set to true to trigger outbound provisioning only for users associated with specific applications.
      - key: fail_on_blocking_outbound_provision_failure
        type: boolean
        required: false
        default: false
        possible_values: [true, false]
        description: >
          Set to true to block the operation that triggered outbound provisioning if the provisioning request fails.
      - key: enable_scim_patch_for_updates
        type: boolean
        required: false
        default: true
        possible_values: [true, false]
        description: >
          Set to true to use SCIM PATCH operations for user attribute updates instead of replacing the entire resource with PUT.
      - key: scim2_client.http_retry_count
        type: integer
        required: false
        default: "1"
        description: >
          The number of retry attempts for failed SCIM 2.0 outbound provisioning requests.
      - key: scim2_client.http_read_timeout
        type: integer
        required: false
        default: "5000"
        description: >
          The read timeout (in milliseconds) for SCIM 2.0 outbound provisioning HTTP requests.
      - key: scim2_client.http_connection_timeout
        type: integer
        required: false
        default: "5000"
        description: >
          The connection timeout (in milliseconds) for SCIM 2.0 outbound provisioning HTTP requests.

  # ─────────────────────────── TENANT CONTEXT ───────────────────────────

  - id: tenant_context
    hyperlink: tenant-context
    title: Tenant context
    tasks: [configure-multi-tenancy]
    description: >
      Controls how tenant-qualified URLs and per-tenant sessions are handled.
      Configure this section for multi-tenant deployments.

    configs:
      - key: enable_tenant_qualified_urls
        type: boolean
        required: false
        default: true
        possible_values: [true, false]
        description: >
          Set to true to include the tenant domain in API endpoint URLs.
          For example, /t/{tenant-domain}/oauth2/token.
      - key: enable_tenanted_sessions
        type: boolean
        required: false
        default: true
        possible_values: [true, false]
        description: >
          Set to true to isolate sessions per tenant, preventing cross-tenant session sharing.
      - key: require_super_tenant_in_urls
        type: boolean
        required: false
        default: false
        possible_values: [true, false]
        description: >
          Set to true to require the super tenant domain in URLs for super tenant API calls.

  # ─────────────────────────── PASSIVE STS ───────────────────────────

  - id: passive_sts
    hyperlink: passive-sts
    title: Passive STS (WS-Federation)
    tasks: [configure-sts]
    description: >
      Configures the WS-Federation passive requestor profile endpoint for browser-based
      federated authentication.

    configs:
      - key: slo.host_name_verification
        type: boolean
        required: false
        default: true
        possible_values: [true, false]
        description: >
          Set to true to enforce hostname verification for back-channel logout requests
          from WS-Federation service providers.
      - key: enable_logout_wreply_validation
        type: boolean
        required: false
        default: true
        possible_values: [true, false]
        description: >
          Set to true to validate the wreply parameter against registered service provider URLs on logout.
      - key: disable_applies_to_in_response
        type: boolean
        required: false
        default: false
        possible_values: [true, false]
        description: >
          Set to true to omit the AppliesTo element from the WS-Federation response.
      - key: soap_enabled
        type: boolean
        required: false
        default: false
        possible_values: [true, false]
        description: >
          Set to true to enable SOAP-based WS-Federation requests in addition to the passive requestor profile.
