openapi: 3.0.0
info:
  title: Notification Senders v2 API
  description: This document specifies **Email, SMS and Push notification sender RESTful API** for **WSO2 Identity Server** organizations.
               To access the notification sender organization APIs in Identity Server, you need to first get an access token from your organization.
  version: "v2"
servers:
  - url: https://localhost:9443/t/{root-organization-name}/o/api/server/v2
    variables:
      serverUrl:
        default: https://localhost:9443/t/{root-organization-name}/o/
      root-organization-name:
        default: "{root-organization-name}"
security:
  - OAuth2: []
paths:
  /notification-senders/email:
    get:
      tags:
        - Email Senders
      summary: Get a list of email senders
      description: |
        This API provides the capability to retrieve the list of email senders. <br>

        <b>Scope(Permission) required:</b> `internal_org_notification_senders_view`
      operationId: getEmailSenders
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailProviderList'
              examples:
                basicAuthWithAuthTypeResponseExample:
                  $ref: '#/components/examples/SMTPBasedEmailSenderWithBasicAuthTypeListResponseExample'
                clientCredentialResponseEXample:
                  $ref: '#/components/examples/SMTPBasedEmailSenderWithClientCredentialAuthTypeListResponseExample'
                httpBasicAuthResponseExample:
                  $ref: '#/components/examples/HTTPBasedEmailSenderWithBasicAuthTypeListResponseExample'
                httpClientCredentialResponseExample:
                  $ref: '#/components/examples/HTTPBasedEmailSenderWithClientCredentialAuthTypeListResponseExample'
                httpBearerTokenResponseExample:
                  $ref: '#/components/examples/HTTPBasedEmailSenderWithBearerTokenAuthTypeListResponseExample'
                httpApiKeyResponseExample:
                  $ref: '#/components/examples/HTTPBasedEmailSenderWithAPIKeyAuthTypeListResponseExample'
                httpNoneAuthResponseExample:
                  $ref: '#/components/examples/HTTPBasedEmailSenderWithNoneAuthTypeListResponseExample'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "405":
          description: Method Not Allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "500":
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      x-codeSamples:
        - lang: Curl
          source: |
            curl -X 'GET' \
            'https://localhost:9443/t/{root-organization-name}/o/api/server/v2/notification-senders/email' \
            -H 'accept: application/json' \
            -H 'Authorization: Bearer {bearer_token}'
    post:
      tags:
        - Email Senders
      summary: Create an email sender
      description: |
        This API provides the capability to create an email sender.\n\nIf the 'name' is not defined, 'EmailPublisher' is taken as the default name. For SMTP-based providers, Basic and Client Credential authentication types are supported. For HTTP-based providers, Basic, Client Credential, Bearer Token, API Key, and None authentication types are supported. <br>

        <b>Scope(Permission) required:</b> `internal_org_notification_senders_create`
      operationId: createEmailSender
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/HTTPBasedEmailSenderAdd'
                - $ref: '#/components/schemas/SMTPBasedEmailSenderAdd'
            examples:
              basicAuthWithAuthTypePOSTEXample:
                $ref: '#/components/examples/SMTPBasedEmailSenderBasicAuthWithAuthTypePOSTRequestExample'
              clientCredentialPOSTEXample:
                $ref: '#/components/examples/SMTPBasedEmailSenderClientCredentialPOSTRequestExample'
              httpBasicAuthPOSTExample:
                $ref: '#/components/examples/HTTPBasedEmailSenderWithBasicAuthTypePOSTRequestExample'
              httpClientCredentialPOSTExample:
                $ref: '#/components/examples/HTTPBasedEmailSenderWithClientCredentialAuthTypePOSTRequestExample'
              httpBearerTokenPOSTExample:
                $ref: '#/components/examples/HTTPBasedEmailSenderWithBearerTokenAuthTypePOSTRequestExample'
              httpApiKeyPOSTExample:
                $ref: '#/components/examples/HTTPBasedEmailSenderWithAPIKeyAuthTypePOSTRequestExample'
              httpNoneAuthPOSTExample:
                $ref: '#/components/examples/HTTPBasedEmailSenderWithNoneAuthTypePOSTRequestExample'
      responses:
        "201":
          description: Successful Response
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/HTTPBasedEmailSenderAdd'
                  - $ref: '#/components/schemas/SMTPBasedEmailSenderAdd'
              examples:
                basicAuthWithAuthTypeResponseExample:
                  $ref: '#/components/examples/SMTPBasedEmailSenderWithBasicAuthTypeResponseExample'
                clientCredentialResponseExample:
                  $ref: '#/components/examples/SMTPBasedEmailSenderWithClientCredentialAuthTypeResponseExample'
                httpBasicAuthResponseExample:
                  $ref: '#/components/examples/HTTPBasedEmailSenderWithBasicAuthTypeResponseExample'
                httpClientCredentialResponseExample:
                  $ref: '#/components/examples/HTTPBasedEmailSenderWithClientCredentialAuthTypeResponseExample'
                httpBearerTokenResponseExample:
                  $ref: '#/components/examples/HTTPBasedEmailSenderWithBearerTokenAuthTypeResponseExample'
                httpApiKeyResponseExample:
                  $ref: '#/components/examples/HTTPBasedEmailSenderWithAPIKeyAuthTypeResponseExample'
                httpNoneAuthResponseExample:
                  $ref: '#/components/examples/HTTPBasedEmailSenderWithNoneAuthTypeResponseExample'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "405":
          description: Method Not Allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "500":
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      x-codeSamples:
        - lang: Curl
          source: |
            curl -X 'POST' \
            'https://localhost:9443/t/{root-organization-name}/o/api/server/v2/notification-senders/email' \
            -H 'accept: application/json' \
            -H 'Authorization: Bearer {bearer_token}' \
            -H 'Content-Type: application/json' \
            -d '{
            "fromAddress": "iam@gmail.com",
            "authType": "BASIC",
            "properties": [
              {
                "key": "mail.smtp.starttls.enable",
                "value": true
              },
              {
                "key": "userName",
                "value": "iam"
              },
              {
                "key": "password",
                "value": "iam123"
              }
            ]
            }'  
  /notification-senders/email/{sender-name}:
    get:
