          type: string
          nullable: true
          description: Tenant domain that owns this element
          example: "wso2.com"

    ElementListResponse:
      type: object
      properties:
        totalResults:
          type: integer
          description: Number of results returned in the current page
          example: 2
        links:
          type: array
          description: Pagination links for next/previous pages
          items:
            $ref: '#/components/schemas/PaginationLink'
        Elements:
          type: array
          description: List of consent elements
          example:
            - id: "f83aa1a3-5d4d-4c0e-84db-c3a4f1e6c8b2"
              name: "email_address"
              displayName: "Email Address"
              description: "User email address used for account notifications and communications"
              tenantDomain: "wso2.com"
            - id: "c2d3e4f5-2345-6789-bcde-f01234567891"
              name: "phone_number"
              displayName: "Phone Number"
              description: "User phone number used for SMS notifications and two-factor authentication"
              tenantDomain: "subsidiaryA.com"
          items:
            $ref: '#/components/schemas/ElementDTO'

    ConsentResponseDTO:
      type: object
      description: Response returned when consent is recorded
      properties:
        id:
          type: string
          description: Unique identifier for this consent
          example: "f83aa1a3-5d4d-4c0e-84db-c3a4f1e6c8b2"
        language:
          type: string
          description: Language code of the consent
          example: "en"
        subjectId:
          type: string
          description: Username of the user giving consent
          example: "alice@wso2.com"
        tenantDomain:
          type: string
          description: Tenant domain
          example: "carbon.super"

    ConsentListResponse:
      type: object
      properties:
        totalResults:
          type: integer
          description: Number of results returned in the current page
          example: 2
        links:
          type: array
          description: Pagination links for next/previous pages
          items:
            $ref: '#/components/schemas/PaginationLink'
        Consents:
          type: array
          description: List of consent records
          example:
            - id: "f83aa1a3-5d4d-4c0e-84db-c3a4f1e6c8b2"
              subjectId: "alice@wso2.com"
              serviceId: "admin-dashboard"
              state: "ACTIVE"
              timestamp: 1744000000000
              expiryTime: 1766383796000
            - id: "c2d3e4f5-2345-6789-bcde-f01234567891"
              subjectId: "bob@wso2.com"
              serviceId: "mobile-app"
              state: "PENDING"
              timestamp: 1744000100000
              expiryTime: null
          items:
            $ref: '#/components/schemas/ConsentSummaryDTO'

    ConsentSummaryDTO:
      type: object
      description: Minimal consent information for list responses
      properties:
        id:
          type: string
          description: Unique identifier for the consent
          example: "f83aa1a3-5d4d-4c0e-84db-c3a4f1e6c8b2"
        subjectId:
          type: string
          description: Username of the user giving consent.
          example: "alice@wso2.com"
        serviceId:
          type: string
          example: "admin-dashboard"
        state:
          type: string
          enum: [PENDING, ACTIVE, REJECTED, REVOKED, EXPIRED]
          example: "ACTIVE"
        timestamp:
          type: integer
          format: int64
          description: Milliseconds since epoch when the consent was created.
          example: 1744000000000
        expiryTime:
          type: integer
          format: int64
          nullable: true
          description: Milliseconds since epoch until which the consent is valid. Null if no expiry.
          example: 1766383796000

    ConsentDTO:
      type: object
      description: Complete consent details
      properties:
        timestamp:
          type: integer
          format: int64
          description: Timestamp of consent (milliseconds since epoch)
          example: 1677686400000
        id:
          type: string
          description: Unique identifier of the consent
          example: "f83aa1a3-5d4d-4c0e-84db-c3a4f1e6c8b2"
        language:
          type: string
          description: Language code
          example: "en"
        subjectId:
          type: string
          description: Username of the user giving consent
          example: "alice@wso2.com"
        serviceId:
          type: string
          description: Service name
          example: "admin-dashboard"
        state:
          type: string
          enum: [PENDING, ACTIVE, REJECTED, REVOKED, EXPIRED]
          description: PENDING if awaiting approvals, ACTIVE if all accepted, REJECTED if any rejected before activation, REVOKED if any user revoked after activation, EXPIRED if expiryTime has passed.
          example: "ACTIVE"
        expiryTime:
          type: integer
          format: int64
          nullable: true
          description: Milliseconds since epoch until which the consent is valid. Null if no expiry.
          example: 1766383796000
        purposes:
          type: array
          description: Purposes and elements in this consent
          items:
            $ref: '#/components/schemas/ConsentedPurposeDTO'
        authorizations:
          type: array
          description: Authorization records associated with this consent
          items:
            $ref: '#/components/schemas/AuthorizationDTO'
        properties:
          type: object
          nullable: true
          description: Properties associated with this consent
          additionalProperties:
            type: string

    ConsentedPurposeDTO:
      type: object
      description: Purpose information within a consent
      properties:
        name:
          type: string
          example: "Privacy Policy"
        id:
          type: string

          example: "f83aa1a3-5d4d-4c0e-84db-c3a4f1e6c8b2"
        type:
          type: string
          description: Purpose type classification
          example: "Policy"
        versionId:
          type: string

          description: UUID of the purpose version that was consented
          example: "f83aa1a3-5d4d-4c0e-84db-c3a4f1e6c8b2"
        version:
          type: string
          description: Human-readable version label (e.g. "2"). Null for pre-versioning consents.
          nullable: true
          example: "2"
        elements:
          type: array
          description: Consented elements for this purpose
          items:
            $ref: '#/components/schemas/ConsentedElementDTO'
        properties:
          type: object
          nullable: true
          description: Key-value properties from the consented purpose version
          additionalProperties:
            type: string

    ConsentedElementDTO:
      type: object
      description: Element information within a consented purpose
      required:
        - id
        - name
      properties:
        id:
          type: string

          example: "f83aa1a3-5d4d-4c0e-84db-c3a4f1e6c8b2"
        name:
          type: string
          example: "email_address"
        displayName:
          type: string
          example: "Email Address"

    # ============================================================================
    # AUTHORIZATION SCHEMAS
    # ============================================================================

    AuthorizationCreateRequest:
      type: object
      properties:
        state:
          type: string
          enum: [APPROVED, REJECTED]
          default: APPROVED
          description: Authorization state.
          example: "APPROVED"

    AuthorizationEntry:
      type: object
      required:
        - userId
      properties:
        userId:
          type: string
          description: Username of the user expected to authorize this consent
          example: "alice@wso2.com"
        type:
          type: string
          description: Type of the authorization principal
          example: "USER"

    AuthorizationDTO:
      type: object
      properties:
        userId:
          type: string
          nullable: true
          description: Username of the user who performed this authorization
          example: "alice@wso2.com"
        state:
          type: string
          enum: [APPROVED, REJECTED, REVOKED, EXPIRED]
          description: Current state of this authorization
          example: "APPROVED"
        updatedTime:
          type: integer
          format: int64
          description: Milliseconds since epoch when this authorization was last updated
          example: 1702800000000

    # ============================================================================
    # CONSENT VALIDATION SCHEMAS
    # ============================================================================

    ConsentValidateResponse:
      type: object
      properties:
        state:
          type: string
          enum: [PENDING, ACTIVE, REJECTED, REVOKED, EXPIRED]
          description: Current state of the consent object.
          example: "ACTIVE"
        expiryTime:
          type: integer
          format: int64
          nullable: true
          description: Milliseconds since epoch until which the consent is valid. Null if no expiry.
          example: 1766383796000

    PaginationLink:
      type: object
      properties:
        rel:
          type: string
          description: Relationship — "next" for forward pagination, "previous" for backward
          example: "next"
        href:
          type: string
          description: URL to retrieve the linked page
          example: "/api/identity/consent-mgt/v2.0/purposes?after=NDoy&limit=10"

    # ============================================================================
    # ERROR SCHEMAS
    # ============================================================================

    ErrorDTO:
      type: object
      description: Error response
      properties:
        code:
          type: string
          description: Error code
          example: "CME_00001"
        message:
          type: string
          description: Human-readable error message
          example: "Purpose not found"
        description:
          type: string
          description: Detailed error description
          example: "No purpose with ID 999 exists in the system"
        traceId:
          type: string
          description: Trace ID for correlating errors in server logs
          example: "abc123def456"

  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: 'https://localhost:9443/oauth2/authorize'
          tokenUrl: 'https://localhost:9443/oauth2/token'
          scopes: {}
