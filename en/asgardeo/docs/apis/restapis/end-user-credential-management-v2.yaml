openapi: 3.0.0
info:
  description: >
    The Credential Management REST API v2 provides an interface to list and manage enrolled
    credentials within the WSO2 Identity Server. The GET endpoint returns credentials grouped
    by type. Supported credential types are passkey, push-auth, and backup-code.
  version: '2.0'
  title: User Credential Management Rest API
  contact:
    name: WSO2
    url: https://wso2.com/identity-server/
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

security:
  - OAuth2: []
  - BasicAuth: []

servers:
  - url: https://{server-url}/t/{tenant-domain}/api/users/v2
    variables:
      tenant-domain:
        default: carbon.super
      server-url:
        default: localhost:9443

paths:
  /{user-id}/credentials:
    get:
      summary: Get all credentials for a user grouped by type
      description: >
        Retrieves all user-enrolled credentials grouped by credential type.
        Requires administrative privileges with scope internal_user_credential_mgt_view.
        Supported credential types are passkey, push authentication, and backup codes.

        <b>Scope (Permission) required:</b> ``internal_user_credential_mgt_view``
      operationId: getUserCredentialsById
      tags:
        - Get User Credentials
      parameters:
        - name: user-id
          in: path
          description: The unique identifier of the user.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialsByType'
              examples:
                response:
                  value:
                    passkey:
                      - credentialId: "a5a81c76-27a3-42d4-82a8-55285d82a4a1"
                        displayName: "YubiKey 5C"
                    push-auth:
                      - credentialId: "b3c92d87-38b4-53e5-93b9-66396e93b5b2"
                        displayName: "My Phone"
                    backup-code: true
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User Not Found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /{user-id}/credentials/{type}:
    post:
      summary: Generate credentials of a specified type for a user.
      description: >
        Generates credentials of the specified type for a user and returns the generated values.
        Calling this endpoint replaces any existing credentials of the same type. Requires
        administrative privileges with scope internal_user_credential_mgt_create.

        <b>Scope (Permission) required:</b> ``internal_user_credential_mgt_create``
      operationId: createUserCredentialByType
      tags:
        - Create User Credentials
      parameters:
        - name: user-id
          in: path
          description: The unique identifier of the user.
          required: true
          schema:
            type: string
        - name: type
          in: path
          description: The type of the credential to generate.
          required: true
          schema:
            type: string
            enum: [backup-code]
      responses:
        '201':
          description: Credentials Created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialCreationResponse'
              examples:
                response:
                  value:
                    type: "backup-code"
                    credentials: ["abc123", "def456", "ghi789"]
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User Not Found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Delete all credentials of a specified type for a user.
      description: >
        Deletes all enrolled credentials of the specified type for a user. Only supported for
        backup-code. Requires administrative privileges with scope internal_user_credential_mgt_delete.

        <b>Scope (Permission) required:</b> ``internal_user_credential_mgt_delete``
      operationId: deleteUserCredentialsByType
      tags:
        - Delete User Credentials
      parameters:
        - name: user-id
          in: path
          description: The unique identifier of the user.
          required: true
          schema:
            type: string
        - name: type
          in: path
          description: The type of the credentials to delete.
          required: true
          schema:
            type: string
            enum: [backup-code]
      responses:
        '204':
          description: User Credentials Deleted.
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User Not Found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /{user-id}/credentials/{type}/{credential-id}:
    delete:
      summary: Delete a user-enrolled credential.
      description: >
        Deletes a specific enrolled credential for a user. Requires administrative privileges with
        scope internal_user_credential_mgt_delete.

        <b>Scope (Permission) required:</b> ``internal_user_credential_mgt_delete``
      operationId: deleteUserCredentialById
      tags:
        - Delete User Credential
      parameters:
        - name: user-id
          in: path
          description: The unique identifier of the user.
          required: true
          schema:
            type: string
        - name: type
          in: path
          description: The type of the credential.
          required: true
          schema:
            type: string
            enum: [passkey, push-auth]
        - name: credential-id
          in: path
          description: The unique identifier of the credential to delete.
          required: true
          schema:
            type: string
      responses:
        '204':
          description: User Credential Deleted.
        '400':
          description: Bad Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Credential not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    CredentialsByType:
      type: object
      description: >
        User credentials grouped by type. passkey and push-auth contain lists of enrolled
        credentials; backup-code is a boolean indicating whether backup codes are enrolled.
      properties:
        passkey:
          type: array
          items:
            $ref: '#/components/schemas/CredentialEntry'
          description: List of enrolled passkey credentials.
        push-auth:
          type: array
          items:
            $ref: '#/components/schemas/CredentialEntry'
          description: List of enrolled push authentication credentials.
        backup-code:
          type: boolean
          description: Whether backup codes are currently enrolled for the user.
    CredentialEntry:
      type: object
      description: A single enrolled credential.
      properties:
        credentialId:
          type: string
          description: The unique identifier for the credential.
          example: 'a5a81c76-27a3-42d4-82a8-55285d82a4a1'
        displayName:
          type: string
          description: A user-friendly name for the credential.
          example: "YubiKey 5C"
    CredentialCreationResponse:
      type: object
      properties:
        type:
          type: string
          description: The type of the created credential.
          example: 'backup-code'
        credentials:
          type: array
          items:
            type: string
          description: The generated credential values.
          example: ['abc123', 'def456', 'ghi789']
    Error:
      type: object
      properties:
        code:
          type: string
          description: A unique, machine-readable error code following the WSO2 standard.
          example: 'UCM-60004'
        message:
          type: string
          description: A human-readable summary of the error.
          example: 'Entity not found.'
        description:
          type: string
          description: A more detailed explanation of the error.
          example: 'The user specified by the user-id does not exist in the system.'
        traceId:
          type: string
          description: The unique identifier for the request.
          example: '8a5f5d4e-1d2c-4f3b-9c6e-7d8f9a0b1c2d'

  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: 'https://localhost:9443/oauth2/authorize'
          tokenUrl: 'https://localhost:9443/oauth2/token'
          scopes:
            read: internal_user_credential_mgt_view
            delete: internal_user_credential_mgt_delete
            create: internal_user_credential_mgt_create
