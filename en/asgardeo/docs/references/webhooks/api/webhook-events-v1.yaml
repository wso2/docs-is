openapi: 3.1.0
info:
  title: API contract for Webhook Events
  version: 1.0.0
  description: |
    Contract for the webhook event payloads emitted by the WSO2 Identity Platform.

    Each webhook event payload provides structured details compliant with the
    [Security Event Token (SET) specification (RFC 8417)](https://datatracker.ietf.org/doc/html/rfc8417) 
    containing issuer information, timestamp, unique identifiers, user and organization context, 
    and event-specific metadata.

    Refer to [Implementing webhooks for forward compatibility](https://wso2.com/identity-platform/docs/guides/webhooks/setup-webhooks/#implementing-webhooks-for-forward-compatibility)
    when implementing the webhook service.

# OpenAPI 3.1 `webhooks`: the Identity Platform is the sender; the consumer implements
# this endpoint. A single payload shape carries every event type.
paths:
  /:
    get:
      summary: Subscription / unsubscription verification (WebSub intent verification).
      description: >-
        Before delivering events, the WSO2 Identity Platform verifies your endpoint for
        each subscribed event type by sending an HTTP GET request, following the
        [WebSub specification](https://www.w3.org/TR/2018/REC-websub-20180123/#hub-verifies-intent).
        Your endpoint must respond with a 2xx status code and echo the exact `hub.challenge`
        value in the response body.
      parameters:
        - name: hub.mode
          in: query
          required: true
          description: Indicates whether the Identity Platform is verifying a subscription or an unsubscription. 
            Possible values; `subscribe`, `unsubscribe`, `denied`
          schema:
            type: string
          example: subscribe
        - name: hub.topic
          in: query
          required: true
          description: >-
            The topic being subscribed to or unsubscribed from, in the format
            `{root-organization-domain}.{root-or-sub-organization-id}.schema.{event-profile-name}.{event-profile-version}.event.{event-type-name}`.
          schema:
            type: string
          example: myorg.dcbd6baa-40c7-4eb9-9c2e-19b868d0e266.schema.wso2.v1.event.login
        - name: hub.challenge
          in: query
          description: A unique, random string generated by the Identity Platform. Your endpoint must return this exact value in the response body.
          schema:
            type: string
          example: 500c4833-91c6-4556-b9a9-1b8e5e00d48b
        - name: hub.lease_seconds
          in: query
          required: false
          description: How long the subscription remains active, in seconds.
          schema:
            type: integer
          example: 864000
        - name: hub.reason
          in: query
          required: false
          description: The reason for which the subscription has been denied. The hub may include this when a subscription is denied.
          schema:
            type: string
          example: Subscription denied.
      responses:
        '200':
          description: Verification acknowledged. The response body must contain the exact `hub.challenge` value.
          content:
            text/plain:
              schema:
                type: string
              example: 500c4833-91c6-4556-b9a9-1b8e5e00d48b

