openapi: 3.0.0
info:
  version: "v1"
  title: Asgardeo - Self Password Update API
  description: |
    This is the RESTful API for self-password updates in Asgardeo, allowing authenticated users to change their own passwords.

    <b>Scope(Permission) required:</b> `internal_user_password_update`

    <blockquote><p><strong>⚠️ Mandatory Configuration</strong></p>
    <p>To enable this API, you must authorize the following API resource within your application settings in the Asgardeo Console:</p>
    <ul>
    <li><strong>API Resource:</strong> <code>/api/users/v1/me/change-password</code></li>
    <li><strong>Authorization Policy:</strong> Set to <code>No Authorization Policy</code></li>
    <li><strong>Required Scope:</strong> <code>internal_user_password_update</code></li>
    </ul>
    <p>Once these settings are applied, any user who authenticates through the application and requests the <code>internal_user_password_update</code> scope will be granted permission automatically. Applications that have not configured this specific API resource and policy will be unable to support self-password updates via this API.</p>
    </blockquote>
security:
  - OAuth2:
      - internal_user_password_update
tags:
  - name: me
    description: Operations for the authenticated user.
servers:
  - url: 'https://api.asgardeo.io/t/{organization-name}/api/users/v1'

paths:
  /me/change-password:
    post:
      tags:
        - me
      summary: Change user password
      description: |
        This API is used to change the password of the authenticated user.

        <b>Scope(Permission) required:</b> `internal_user_password_update`
      operationId: changePassword
      requestBody:
        description: Password change request.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
      responses:
        '204':
          $ref: '#/components/responses/Success'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'

components:
  schemas:
    #-----------------------------------------------------
    # Password Change Request object
    #-----------------------------------------------------
    PasswordChangeRequest:
      type: object
      required:
        - currentPassword
        - newPassword
      properties:
        currentPassword:
          type: string
          description: Current password of the user.
          example: "CurrentPassword123"
        newPassword:
          type: string
          description: New password to set for the user.
          example: "NewPassword456"

    #-----------------------------------------------------
    # Error object
    #-----------------------------------------------------
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: "PWD-10001"
        message:
          type: string
          example: "Invalid current password"
        description:
          type: string
          example: "The current password provided is incorrect."
        traceId:
          type: string
          example: "e0fbcfeb-3617-43c4-8dd0-7b7d38e13047"

  #-----------------------------------------------------
  # Descriptions of common responses
  #-----------------------------------------------------
  responses:
    Success:
      description: Password successfully changed
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            InvalidCurrentPassword:
              $ref: '#/components/examples/InvalidCurrentPassword'
            PasswordPolicyViolation:
              $ref: '#/components/examples/PasswordPolicyViolation'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  #-----------------------------------------------------
  # Examples
  #-----------------------------------------------------
  examples:
    InvalidCurrentPassword:
      summary: Wrong current password
      value:
        code: "PWD-10001"
        message: "Invalid current password"
        description: "The current password provided is incorrect."
        traceId: "e0fbcfeb-3617-43c4-8dd0-7b7d38e13047"
    PasswordPolicyViolation:
      summary: New password too weak
      value:
        code: "PWD-10003"
        message: "Password policy violation"
        description: "The minimum length of password should be 8."
        traceId: "e0fbcfeb-3617-43c4-8dd0-7b7d38e13047"

  securitySchemes:
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: 'https://api.asgardeo.io/t/{organization-name}/oauth2/authorize'
          tokenUrl: 'https://api.asgardeo.io/t/{organization-name}/oauth2/token'
          scopes:
            internal_user_password_update: Allows the authenticated user to update their own password.
